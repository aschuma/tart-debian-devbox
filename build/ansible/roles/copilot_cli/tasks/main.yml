---
- name: Check if GitHub Copilot CLI is installed
  ansible.builtin.command: gh copilot --version
  register: copilot_check
  failed_when: false
  changed_when: false

- name: Install GitHub Copilot CLI
  ansible.builtin.shell: |
    export NVM_DIR="{{ copilot_cli_nvm_dir }}"
    source "$NVM_DIR/nvm.sh"
    npm install -g @github/copilot
  args:
    executable: /bin/bash
  async: 300
  poll: 10
  when: copilot_check.rc != 0
  changed_when: copilot_check.rc != 0
