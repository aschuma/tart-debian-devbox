---
- name: Check if Maven {{ maven_version }} is installed
  ansible.builtin.stat:
    path: "{{ maven_install_dir }}/apache-maven-{{ maven_version }}/bin/mvn"
  register: mvn_bin

- name: Download Maven {{ maven_version }}
  ansible.builtin.get_url:
    url: "{{ maven_download_url }}"
    dest: "/tmp/apache-maven-{{ maven_version }}-bin.tar.gz"
    mode: '0644'
    timeout: 600
  when: not mvn_bin.stat.exists

- name: Create Maven install directory
  ansible.builtin.file:
    path: "{{ maven_install_dir }}"
    state: directory
    mode: '0755'

- name: Extract Maven {{ maven_version }}
  ansible.builtin.unarchive:
    src: "/tmp/apache-maven-{{ maven_version }}-bin.tar.gz"
    dest: "{{ maven_install_dir }}"
    remote_src: true
  when: not mvn_bin.stat.exists

- name: Add Maven to PATH
  ansible.builtin.lineinfile:
    path: /etc/profile.d/maven.sh
    regexp: '^export PATH=\$PATH:.*\/bin'
    line: "export PATH=$PATH:{{ maven_install_dir }}/apache-maven-{{ maven_version }}/bin"
    create: true
    mode: '0644'

- name: Verify Maven
  ansible.builtin.command: "{{ maven_install_dir }}/apache-maven-{{ maven_version }}/bin/mvn --version"
  environment:
    JAVA_HOME: "{{ java_home }}"
    PATH: "{{ ansible_facts['env']['PATH'] }}:{{ java_home }}/bin"
  register: mvn_ver
  changed_when: false

- name: Show Maven version
  ansible.builtin.debug:
    msg: "{{ mvn_ver.stdout_lines[0] }}"

- name: Clean up Maven archive
  ansible.builtin.file:
    path: "/tmp/apache-maven-{{ maven_version }}-bin.tar.gz"
    state: absent
