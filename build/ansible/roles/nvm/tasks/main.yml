---
- name: Check if nvm {{ nvm_version }} is installed
  stat:
    path: "{{ nvm_install_dir }}/nvm.sh"
  register: nvm_sh

- name: Create nvm install directory
  file:
    path: "{{ nvm_install_dir }}"
    state: directory
    mode: '0755'
  when: not nvm_sh.stat.exists

- name: Download nvm {{ nvm_version }} install script
  get_url:
    url: "https://raw.githubusercontent.com/nvm-sh/nvm/v{{ nvm_version }}/install.sh"
    dest: /tmp/nvm-install.sh
    mode: '0755'
    timeout: 600
  when: not nvm_sh.stat.exists

- name: Install nvm {{ nvm_version }}
  shell: bash /tmp/nvm-install.sh
  args:
    executable: /bin/bash
  environment:
    NVM_DIR: "{{ nvm_install_dir }}"
  when: not nvm_sh.stat.exists

- name: Check if Node.js LTS default alias is set
  stat:
    path: "{{ nvm_install_dir }}/alias/default"
  register: node_default

- name: Install Node.js LTS and set as default
  shell: |
    export NVM_DIR="{{ nvm_install_dir }}"
    source "{{ nvm_install_dir }}/nvm.sh"
    nvm install "{{ node_version }}"
    nvm alias default "{{ node_version }}"
  args:
    executable: /bin/bash
  when: not node_default.stat.exists

- name: Configure nvm system-wide via profile.d
  copy:
    dest: /etc/profile.d/nvm.sh
    mode: '0644'
    content: |
      export NVM_DIR="{{ nvm_install_dir }}"
      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
      [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"

- name: Verify node version
  shell: |
    export NVM_DIR="{{ nvm_install_dir }}"
    source "{{ nvm_install_dir }}/nvm.sh"
    node --version
  args:
    executable: /bin/bash
  register: node_ver
  changed_when: false

- name: Show Node.js version
  debug:
    msg: "{{ node_ver.stdout }}"

- name: Verify npx version
  shell: |
    export NVM_DIR="{{ nvm_install_dir }}"
    source "{{ nvm_install_dir }}/nvm.sh"
    npx --version
  args:
    executable: /bin/bash
  register: npx_ver
  changed_when: false

- name: Show npx version
  debug:
    msg: "{{ npx_ver.stdout }}"

- name: Clean up nvm install script
  file:
    path: /tmp/nvm-install.sh
    state: absent
