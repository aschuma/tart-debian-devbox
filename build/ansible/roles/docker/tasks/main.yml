---
# Bookworm has an official Docker repo — no codename fallback needed
- name: Remove legacy Docker packages
  ansible.builtin.apt:
    name: [docker, docker-engine, docker.io, containerd, runc]
    state: absent

- name: Install gnupg for GPG key dearmoring
  ansible.builtin.apt:
    name: gnupg
    state: present

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Check if Docker GPG keyring already exists
  ansible.builtin.stat:
    path: /etc/apt/keyrings/docker-archive-keyring.gpg
  register: docker_keyring_stat

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /tmp/docker.asc
    mode: '0644'
    timeout: 600
  when: not docker_keyring_stat.stat.exists

- name: Dearmor Docker GPG key
  ansible.builtin.command: gpg --batch --yes --dearmor -o /etc/apt/keyrings/docker-archive-keyring.gpg /tmp/docker.asc
  when: not docker_keyring_stat.stat.exists
  changed_when: not docker_keyring_stat.stat.exists

- name: Add Docker apt repository (bookworm)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: "deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/debian bookworm stable\n"
    mode: '0644'

- name: Refresh apt cache after adding Docker repo
  ansible.builtin.apt:
    update_cache: true

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Enable and start Docker daemon
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Add admin user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

- name: Verify Docker
  ansible.builtin.command: docker --version
  register: docker_ver
  changed_when: false

- name: Show Docker version
  ansible.builtin.debug:
    msg: "{{ docker_ver.stdout }}"

- name: Clean up Docker GPG key download
  ansible.builtin.file:
    path: /tmp/docker.asc
    state: absent
  when: not docker_keyring_stat.stat.exists
