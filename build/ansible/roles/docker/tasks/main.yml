---
# Bookworm has an official Docker repo — no codename fallback needed
- name: Remove legacy Docker packages
  apt:
    name: [docker, docker-engine, docker.io, containerd, runc]
    state: absent

- name: Install gnupg for GPG key dearmoring
  apt:
    name: gnupg
    state: present

- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker GPG key
  get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /tmp/docker.asc
    mode: '0644'
    force: true
    timeout: 600

- name: Dearmor Docker GPG key
  shell: gpg --batch --yes --dearmor -o /etc/apt/keyrings/docker-archive-keyring.gpg /tmp/docker.asc

- name: Add Docker apt repository (bookworm)
  copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: "deb [arch={{ arch }} signed-by=/etc/apt/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/debian bookworm stable\n"
    mode: '0644'

- name: Refresh apt cache after adding Docker repo
  apt:
    update_cache: true

- name: Install Docker Engine and Compose plugin
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Enable and start Docker daemon
  systemd:
    name: docker
    enabled: true
    state: started

- name: Add admin user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

- name: Verify Docker
  command: docker --version
  register: docker_ver
  changed_when: false

- name: Show Docker version
  debug:
    msg: "{{ docker_ver.stdout }}"

- name: Clean up Docker GPG key download
  file:
    path: /tmp/docker.asc
    state: absent
