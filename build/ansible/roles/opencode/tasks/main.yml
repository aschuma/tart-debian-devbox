---
- name: Check if opencode is installed
  ansible.builtin.command: opencode --version
  register: opencode_check
  failed_when: false
  changed_when: false

- name: Install opencode
  ansible.builtin.shell: |
    export NVM_DIR="{{ opencode_nvm_dir }}"
    source "$NVM_DIR/nvm.sh"
    npm install -g opencode-ai
  args:
    executable: /bin/bash
  async: 300
  poll: 10
  when: opencode_check.rc != 0
  changed_when: opencode_check.rc != 0
