---
# =============================================================================
# playbook.yml — Ansible Playbook for Tart Debian 12 (Bookworm) VM
#
# Installs: CLI tools, Docker, Java 21, Gradle, Maven, GraalPy
# =============================================================================

- name: Provision Debian 12 (Bookworm) Dev VM
  hosts: all
  become: true
  gather_facts: true

  # ---------------------------------------------------------------------------
  pre_tasks:

    - name: Update apt cache and upgrade all packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600
      tags: [always]

  # ---------------------------------------------------------------------------
  roles:

    - role: ssh_setup
      tags: [ssh]

    - role: common_tools
      tags: [tools]

    - role: nvm
      tags: [nvm]

    - role: acli
      tags: [acli]

    - role: copilot_cli
      tags: [copilot-cli]

    - role: opencode
      tags: [opencode]  

    - role: java
      tags: [java]

    - role: docker
      tags: [docker]

    - role: gradle
      tags: [gradle]

    - role: maven
      tags: [maven]

    - role: graalpy
      tags: [graalpy]

  # ---------------------------------------------------------------------------
  post_tasks:

    - name: Clean up apt cache
      ansible.builtin.apt:
        autoclean: true
        autoremove: true
      tags: [always]

    - name: Provisioning complete
      ansible.builtin.debug:
        msg: >-
          Done — Java={{ java_version }} ({{ java_build }}) Gradle={{ gradle_version }}
          Maven={{ maven_version }} GraalPy={{ graalpy_version }}
          nvm={{ nvm_version }} Node.js={{ node_version }}
          Docker and Atlassian CLI installed. Reboot recommended for docker group changes.
      tags: [always]
