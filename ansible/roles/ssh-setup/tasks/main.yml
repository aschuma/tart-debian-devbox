---
- name: Install OpenSSH server
  apt:
    name: openssh-server
    state: present
    update_cache: true

- name: Copy hardened sshd_config
  copy:
    src: sshd_config
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0644"

- name: Enable and start SSH
  systemd:
    name: ssh
    enabled: true
    state: started

- name: Restart SSH to apply config
  systemd:
    name: ssh
    state: restarted
